{% load static %}
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">

<div class="container">
<h2>Add Note</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Title">
    <textarea name="content" placeholder="Write your note..."></textarea>
    <button type="submit">Save Note</button>
</form>

</div>
