{% load static %}
<link rel="stylesheet" href="{% static 'notes/style.css' %}">

<div class="container">
<h2>Edit Note</h2>

<form method="POST">
    {% csrf_token %}
    
    <input type="text" name="title" value="{{ note.title }}">
    
    <textarea name="content">{{ note.content }}</textarea>
    
    <button type="submit">Update Note</button>
</form>

<a href="{% url 'note_list' %}">Back</a>
</div>
